<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다람쥐 도토리 찾기</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-wrapper">
    <h1>다람쥐 도토리 찾기</h1>

    <div class="top-ui">
        <div>모은 도토리: <span id="score">0</span> / 10</div>
        <div>남은 시간: <span id="time">30</span>초</div>
        <div>목표: 도토리 모두 모으기</div>
    </div>

    <div id="game-board">
        <div class="sun"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>

        <div class="tree tree1"></div>
        <div class="tree tree2"></div>
        <div class="tree tree3"></div>
        <div class="tree tree4"></div>

        <div class="grass"></div>
        <div class="ground"></div>

        <div id="player">
            <div class="squirrel-tail"></div>
            <div class="squirrel-body"></div>
            <div class="squirrel-head">
                <div class="squirrel-ear"></div>
                <div class="squirrel-eye"></div>
                <div class="squirrel-cheek"></div>
                <div class="squirrel-nose"></div>
            </div>
            <div class="squirrel-arm"></div>
            <div class="squirrel-leg"></div>
        </div>
    </div>

    <p id="message">게임 시작 버튼을 누르세요!</p>

    <div class="button-box">
        <button id="start-btn">게임 시작</button>
        <button id="restart-btn">다시 시작</button>
    </div>

    <div class="description-box">
        <h2>게임 설명</h2>
        <p>숲속에 떨어진 도토리를 다람쥐가 제한 시간 안에 모두 모아야 합니다.</p>
        <p>방향키를 누르고 있으면 다람쥐가 부드럽게 움직입니다.</p>
        <p>도토리 10개를 모두 모으면 성공입니다.</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
