<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>햄스터 먹이 찾기</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-wrapper">
    <h1>햄스터 먹이 찾기</h1>

    <div class="top-ui">
        <div>먹은 씨앗: <span id="score">0</span> / 10</div>
        <div>남은 시간: <span id="time">30</span>초</div>
        <div>목표: 씨앗 모두 찾기</div>
    </div>

    <div id="game-board">
        <div class="sun"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>

        <div class="tree tree1"></div>
        <div class="tree tree2"></div>
        <div class="tree tree3"></div>
        <div class="tree tree4"></div>

        <div class="grass"></div>
        <div class="ground"></div>

        <div id="player">
            <div class="ear left-ear"></div>
            <div class="ear right-ear"></div>
            <div class="face">
                <span class="eye left-eye"></span>
                <span class="eye right-eye"></span>
                <span class="nose"></span>
            </div>
        </div>
    </div>

    <p id="message">게임 시작 버튼을 누르세요!</p>

    <div class="button-box">
        <button id="start-btn">게임 시작</button>
        <button id="restart-btn">다시 시작</button>
    </div>

    <div class="description-box">
        <h2>게임 설명</h2>
        <p>숲속에 떨어진 씨앗을 햄스터가 제한 시간 안에 모두 찾아야 합니다.</p>
        <p>방향키 또는 마우스로 햄스터를 움직일 수 있습니다.</p>
        <p>씨앗 10개를 모두 모으면 성공입니다.</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
