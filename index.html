<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다람쥐 도토리 수집</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-wrapper">
    <h1>다람쥐 도토리 수집</h1>

    <div id="unlock-message">1단계를 클리어하면 2단계가 해금됩니다!</div>

    <div class="mode-box">
        <button id="stage1-btn" class="selected-mode">1단계</button>
        <button id="stage2-btn" disabled>2단계</button>
        <button id="infinite-btn" disabled>무한모드</button>
    </div>

    <div class="top-ui">
        <div>현재 단계: <span id="stage">1단계</span></div>
        <div>모은 도토리: <span id="score">0</span> / <span id="target">10</span></div>
        <div>남은 시간: <span id="time">30</span>초</div>
    </div>

    <div id="game-board">
        <div class="forest-layer layer1"></div>
        <div class="forest-layer layer2"></div>
        <div class="forest-layer layer3"></div>

        <div id="start-overlay">
            <div class="overlay-box">
                <h2 id="start-title">1단계 시작</h2>
                <p id="start-text">도토리 10개를 모으면 클리어됩니다.</p>
                <button id="overlay-start-btn">게임 시작</button>
            </div>
        </div>

        <div id="result-box" class="hidden">
            <h2 id="result-title">게임 종료</h2>
            <p id="result-text">결과 안내 문구</p>

            <div id="ranking-input-box" class="hidden">
                <input id="player-name" type="text" maxlength="8" placeholder="이름 입력" autocomplete="off">
                <button id="save-rank-btn">랭킹 등록</button>
            </div>

            <div id="result-button-box"></div>
        </div>

        <div id="player">
            <div id="shield-timer" class="hidden">3</div>
            <div class="shield-effect hidden"></div>

            <div class="squirrel-tail"></div>
            <div class="squirrel-body"></div>
            <div class="squirrel-head">
                <div class="squirrel-ear"></div>
                <div class="squirrel-eye"></div>
                <div class="squirrel-cheek"></div>
                <div class="squirrel-nose"></div>
            </div>
            <div class="squirrel-arm"></div>
            <div class="squirrel-leg"></div>
        </div>
    </div>

    <p id="message">1단계를 선택하고 게임을 시작하세요!</p>

    <div class="ranking-board">
        <h2>무한모드 랭킹</h2>
        <ol id="ranking-list"></ol>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
